<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#0969da"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- Stacked diff lines: gutter glyph (left) + code line (right) -->

  <!-- Addition (green) -->
  <g>
    <!-- + glyph -->
    <rect x="222" y="344" width="80" height="20" rx="10" fill="#3fb950"/>
    <rect x="252" y="314" width="20" height="80" rx="10" fill="#3fb950"/>
    <!-- code line -->
    <rect x="360" y="344" width="392" height="48" rx="24" fill="#3fb950"/>
  </g>

  <!-- Context (neutral white) -->
  <g>
    <rect x="360" y="488" width="304" height="48" rx="24" fill="#ffffff" fill-opacity="0.82"/>
  </g>

  <!-- Deletion (red) -->
  <g>
    <!-- − glyph -->
    <rect x="222" y="652" width="80" height="20" rx="10" fill="#f85149"/>
    <!-- code line -->
    <rect x="360" y="632" width="344" height="48" rx="24" fill="#f85149"/>
  </g>
</svg>
